<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanTrack — Personal Finance Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            50: '#ecfdf5',
                            100: '#d1fae5',
                            200: '#a7f3d0',
                            300: '#6ee7b7',
                            400: '#34d399',
                            500: '#10b981',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
        .font-mono-jb {
            font-family: 'JetBrains Mono', monospace;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-200">

<div class="flex h-screen overflow-hidden">
    <!-- SIDEBAR -->
    <aside id="sidebar" class="hidden md:flex flex-col w-64 bg-white border-r border-slate-200 h-full flex-shrink-0 transition-transform z-20">
        <!-- Logo Header -->
        <div class="flex items-center gap-3 px-6 py-5 border-b border-slate-100">
            <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-gradient-to-tr from-primary-600 to-emerald-400 text-white shadow-md shadow-primary-100">
                <i data-lucide="wallet" class="w-5 h-5"></i>
            </div>
            <div>
                <h1 class="font-bold text-lg leading-none tracking-tight">CuanTrack</h1>
                <span class="text-[10px] text-slate-400 font-semibold tracking-wider uppercase">AI Financial Co-Pilot</span>
            </div>
        </div>

        <!-- Navigation Menu -->
        <nav class="flex-1 overflow-y-auto px-4 py-6 space-y-1" id="sidebar-nav">
            <!-- Nav Links created dynamically below -->
        </nav>

        <!-- Current User Status -->
        <div class="p-4 border-t border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-primary-100 text-primary-700 font-bold flex items-center justify-center text-sm" id="user-avatar-initial">
                    U
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-slate-700 truncate" id="sidebar-user-name">Loading...</p>
                    <p class="text-xs text-slate-400 truncate" id="sidebar-user-lang">Bilingual (ID/EN)</p>
                </div>
                <button onclick="toggleDarkMode()" class="p-1.5 rounded-lg text-slate-400 hover:bg-slate-100 hover:text-slate-600">
                    <i data-lucide="moon" class="w-4 h-4"></i>
                </button>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT CONTAINER -->
    <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
        <!-- TOP APP BAR -->
        <header class="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-6 flex-shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebarMobile()" class="p-2 -ml-2 rounded-lg text-slate-500 hover:bg-slate-100 md:hidden">
                    <i data-lucide="menu" class="w-5 h-5"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></div>
                    <p class="text-xs text-slate-400 font-semibold uppercase tracking-wider" id="header-connection-status">Connecting to Local Store</p>
                </div>
            </div>

            <!-- Header Actions -->
            <div class="flex items-center gap-3">
                <select id="user-selector" onchange="switchUser(this.value)" class="text-sm border border-slate-200 rounded-lg bg-white px-3 py-1.5 focus:outline-none focus:ring-2 focus:ring-primary-500 text-slate-600 font-medium">
                    <option value="12345">Demo User</option>
                </select>

                <button onclick="openQuickAddModal()" class="flex items-center gap-2 bg-primary-600 hover:bg-primary-700 text-white text-sm font-semibold px-4 py-2 rounded-xl transition duration-150 shadow-sm shadow-primary-100">
                    <i data-lucide="plus" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">Tambah Transaksi</span>
                </button>
            </div>
        </header>

        <!-- VIEW WRAPPER -->
        <div class="flex-1 overflow-y-auto p-6 space-y-6" id="view-container">
            <!-- Dynamic Views injected here -->
        </div>

        <!-- MOBILE BOTTOM BAR -->
        <nav class="md:hidden h-16 bg-white border-t border-slate-200 flex items-center justify-around px-2 flex-shrink-0 z-10" id="mobile-nav">
            <!-- Dynamic Mobile navigation created below -->
        </nav>
    </main>
</div>

<!-- =============================================
     MODALS
================================================= -->

<!-- 1. QUICK ADD TRANSACTION MODAL -->
<div id="quick-add-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center hidden">
    <div class="bg-white rounded-2xl w-full max-w-lg p-6 mx-4 shadow-xl border border-slate-100 animate-in fade-in zoom-in-95 duration-150">
        <div class="flex items-center justify-between pb-4 border-b border-slate-100">
            <h3 class="text-lg font-bold text-slate-800">Catat Transaksi Baru</h3>
            <button onclick="closeQuickAddModal()" class="text-slate-400 hover:text-slate-600 p-1 rounded-lg">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>

        <form id="quick-add-form" onsubmit="handleTransactionSubmit(event)" class="mt-4 space-y-4">
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1.5">Tipe Aliran Dana</label>
                <div class="grid grid-cols-4 gap-2">
                    <button type="button" onclick="setFormType('expense')" id="btn-form-expense" class="py-2.5 rounded-xl border-2 border-primary-500 bg-primary-50 text-primary-700 font-bold text-sm flex items-center justify-center gap-1.5">
                        <i data-lucide="arrow-down-right" class="w-4 h-4"></i> Keluar
                    </button>
                    <button type="button" onclick="setFormType('income')" id="btn-form-income" class="py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold text-sm flex items-center justify-center gap-1.5">
                        <i data-lucide="arrow-up-left" class="w-4 h-4"></i> Masuk
                    </button>
                    <button type="button" onclick="setFormType('transfer')" id="btn-form-transfer" class="py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold text-sm flex items-center justify-center gap-1.5">
                        <i data-lucide="arrow-left-right" class="w-4 h-4"></i> Transfer
                    </button>
                    <button type="button" onclick="setFormType('bills')" id="btn-form-bills" class="py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold text-sm flex items-center justify-center gap-1.5">
                        <i data-lucide="calendar-check" class="w-4 h-4"></i> Tagihan
                    </button>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Nama / Keterangan</label>
                    <input type="text" id="form-name" required placeholder="Contoh: Makan Siang Nasi Padang" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Nominal (Rp)</label>
                    <input type="number" id="form-amount" required placeholder="Contoh: 25000" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono-jb">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1" id="label-category">Kategori Pengeluaran</label>
                    <select id="form-category" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                        <!-- Options filled dynamically -->
                    </select>
                </div>
                <div id="form-source-destination-container">
                    <div class="grid grid-cols-2 gap-2" id="source-dest-fields">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 mb-1" id="label-source">Dari Dompet</label>
                            <select id="form-source" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <!-- Options filled dynamically -->
                            </select>
                        </div>
                        <div id="dest-container" class="hidden">
                            <label class="block text-xs font-semibold text-slate-500 mb-1">Ke Dompet</label>
                            <select id="form-dest" class="w-full border border-slate-200 rounded-xl px-3 py-2 text-xs focus:outline-none focus:ring-2 focus:ring-primary-500">
                                <!-- Options filled dynamically -->
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-500 mb-1">Tanggal Transaksi (Opsional)</label>
                <input type="date" id="form-date" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
            </div>

            <div class="pt-4 border-t border-slate-100 flex justify-end gap-3">
                <button type="button" onclick="closeQuickAddModal()" class="border border-slate-200 text-slate-500 font-semibold px-4 py-2.5 rounded-xl text-sm hover:bg-slate-50">
                    Batal
                </button>
                <button type="submit" class="bg-primary-600 text-white font-bold px-5 py-2.5 rounded-xl text-sm hover:bg-primary-700 shadow-sm shadow-primary-100 flex items-center gap-1.5">
                    <i data-lucide="check" class="w-4 h-4"></i> Simpan Transaksi
                </button>
            </div>
        </form>
    </div>
</div>

<!-- =============================================
     APPLICATION SCRIPT
================================================= -->
<script>
    // State management
    let state = {
        currentView: 'overview',
        users: [],
        currentUserId: '12345',
        currentUserData: null,
        transactions: [],
        connectionStatus: 'connecting',
        formType: 'expense',
        darkMode: false,
        activeLang: 'id' // 'id' or 'en'
    };

    // Dictionary bilingual
    const t = {
        id: {
            dashboard: 'Dashboard',
            transactions: 'Transaksi',
            wallets: 'Dompet',
            categories: 'Kategori',
            budget: 'Anggaran',
            goals: 'Tabungan',
            splitBill: 'Split Bill',
            debt: 'Hutang',
            receivables: 'Piutang',
            reports: 'Laporan',
            aiInsight: 'Cuan AI Insight',
            premium: 'Premium',
            settings: 'Pengaturan',
            profile: 'Profil',
            totalBalance: 'Total Saldo',
            income: 'Pemasukan',
            expense: 'Pengeluaran',
            cashflow: 'Aliran Kas',
            recentTransactions: 'Transaksi Terakhir',
            noTransactions: 'Belum ada transaksi terekam',
            addTransaction: 'Tambah Transaksi',
            quickAction: 'Aksi Cepat',
            budgetProgress: 'Batas Anggaran Bulanan',
            savingProgress: 'Target Tabungan',
            unpaidBills: 'Tagihan Belum Dibayar',
            paid: 'Lunas',
            unpaid: 'Belum Lunas'
        },
        en: {
            dashboard: 'Dashboard',
            transactions: 'Transactions',
            wallets: 'Wallets',
            categories: 'Categories',
            budget: 'Budget',
            goals: 'Goals',
            splitBill: 'Split Bill',
            debt: 'Debt',
            receivables: 'Receivables',
            reports: 'Reports',
            aiInsight: 'Cuan AI Insight',
            premium: 'Premium',
            settings: 'Settings',
            profile: 'Profile',
            totalBalance: 'Total Balance',
            income: 'Income',
            expense: 'Expense',
            cashflow: 'Cashflow',
            recentTransactions: 'Recent Transactions',
            noTransactions: 'No transactions recorded yet',
            addTransaction: 'Add Transaction',
            quickAction: 'Quick Action',
            budgetProgress: 'Monthly Budget Limits',
            savingProgress: 'Saving Goals',
            unpaidBills: 'Upcoming Bills',
            paid: 'Paid',
            unpaid: 'Unpaid'
        }
    };

    // Sidebar items definition
    const menuItems = [
        { id: 'overview', label: 'dashboard', icon: 'layout-dashboard' },
        { id: 'transactions', label: 'transactions', icon: 'arrow-down-up' },
        { id: 'wallets', label: 'wallets', icon: 'credit-card' },
        { id: 'categories', label: 'categories', icon: 'tag' },
        { id: 'budget', label: 'budget', icon: 'piggy-bank' },
        { id: 'goals', label: 'goals', icon: 'target' },
        { id: 'split-bill', label: 'splitBill', icon: 'users-round' },
        { id: 'debt', label: 'debt', icon: 'landmark' },
        { id: 'receivables', label: 'receivables', icon: 'hand-coins' },
        { id: 'reports', label: 'reports', icon: 'bar-chart-3' },
        { id: 'ai-insight', label: 'aiInsight', icon: 'sparkles' },
        { id: 'premium', label: 'premium', icon: 'star' },
        { id: 'settings', label: 'settings', icon: 'settings' },
        { id: 'profile', label: 'profile', icon: 'user' }
    ];

    // On Load
    window.addEventListener('DOMContentLoaded', async () => {
        setupLayouts();
        await refreshData();
        renderActiveView();
    });

    // Setup initial menu structures
    function setupLayouts() {
        // Render desktop sidebar
        const navContainer = document.getElementById('sidebar-nav');
        navContainer.innerHTML = '';
        menuItems.forEach(item => {
            const btn = document.createElement('button');
            btn.onclick = () => setView(item.id);
            btn.id = `nav-${item.id}`;
            btn.className = "flex items-center gap-3 w-full px-4 py-2.5 text-sm font-medium rounded-xl transition-all duration-150 text-slate-500 hover:bg-slate-50 hover:text-slate-900";
            btn.innerHTML = `<i data-lucide="${item.icon}" class="w-4 h-4"></i><span>${t[state.activeLang][item.label]}</span>`;
            navContainer.appendChild(btn);
        });

        // Render mobile bottom navigation bar (show top 5 items)
        const mobileContainer = document.getElementById('mobile-nav');
        mobileContainer.innerHTML = '';
        const top5 = [
            { id: 'overview', label: 'dashboard', icon: 'layout-dashboard' },
            { id: 'transactions', label: 'transactions', icon: 'arrow-down-up' },
            { id: 'ai-insight', label: 'aiInsight', icon: 'sparkles' },
            { id: 'budget', label: 'budget', icon: 'piggy-bank' },
            { id: 'settings', label: 'settings', icon: 'settings' }
        ];
        top5.forEach(item => {
            const btn = document.createElement('button');
            btn.onclick = () => setView(item.id);
            btn.id = `mobile-nav-${item.id}`;
            btn.className = "flex flex-col items-center justify-center flex-1 h-full text-slate-400 gap-1";
            btn.innerHTML = `<i data-lucide="${item.icon}" class="w-5 h-5"></i><span class="text-[9px] font-bold tracking-tight">${t[state.activeLang][item.label]}</span>`;
            mobileContainer.appendChild(btn);
        });

        lucide.createIcons();
    }

    // Refresh core app data from backend APIs
    async function refreshData() {
        try {
            // Load status/health check
            const statusRes = await fetch('/api/status');
            const status = await statusRes.json();
            state.connectionStatus = 'connected';
            document.getElementById('header-connection-status').innerText = 'Online — Synced to Local Store';
            document.getElementById('header-connection-status').className = 'text-xs text-emerald-500 font-bold uppercase tracking-wider';

            // Fetch users list
            const usersRes = await fetch('/api/users');
            state.users = await usersRes.json();
            populateUserSelector();

            // Fetch current user details
            const userRes = await fetch(`/api/user/${state.currentUserId}`);
            state.currentUserData = await userRes.json();
            
            // Adjust active local language based on user context
            state.activeLang = state.currentUserData.lang || 'id';
            document.getElementById('sidebar-user-name').innerText = state.currentUserData.name;
            document.getElementById('user-avatar-initial').innerText = state.currentUserData.name.charAt(0).toUpperCase();
            document.getElementById('sidebar-user-lang').innerText = state.activeLang === 'id' ? 'Bahasa Indonesia' : 'English Language';

            // Fetch user transactions
            const txRes = await fetch(`/api/transactions/${state.currentUserId}`);
            state.transactions = await txRes.json();

            populateModalDropdowns();
        } catch (err) {
            console.error('Error connecting to backend API', err);
            state.connectionStatus = 'offline';
            document.getElementById('header-connection-status').innerText = 'Offline Mode';
            document.getElementById('header-connection-status').className = 'text-xs text-amber-500 font-bold uppercase tracking-wider';
        }
    }

    function populateUserSelector() {
        const selector = document.getElementById('user-selector');
        selector.innerHTML = '';
        state.users.forEach(u => {
            const opt = document.createElement('option');
            opt.value = u.userId;
            opt.innerText = `${u.name} (${u.userId})`;
            if (u.userId === state.currentUserId) opt.selected = true;
            selector.appendChild(opt);
        });
    }

    async function switchUser(userId) {
        state.currentUserId = userId;
        await refreshData();
        setupLayouts();
        renderActiveView();
    }

    function populateModalDropdowns() {
        if (!state.currentUserData) return;

        // Categories
        const catSelect = document.getElementById('form-category');
        catSelect.innerHTML = '';
        const cats = state.formType === 'income' 
            ? state.currentUserData.incomeSources 
            : state.currentUserData.spendingCategories;
        
        if (cats && cats.length > 0) {
            cats.forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.name;
                opt.innerText = `${c.emoji || '🏷️'} ${c.name}`;
                catSelect.appendChild(opt);
            });
        } else {
            const opt = document.createElement('option');
            opt.value = 'General';
            opt.innerText = 'General';
            catSelect.appendChild(opt);
        }

        // Wallets / Accounts
        const srcSelect = document.getElementById('form-source');
        const destSelect = document.getElementById('form-dest');
        srcSelect.innerHTML = '';
        destSelect.innerHTML = '';

        if (state.currentUserData.accounts && state.currentUserData.accounts.length > 0) {
            state.currentUserData.accounts.forEach(a => {
                const opt = document.createElement('option');
                opt.value = a.name;
                opt.innerText = `${a.emoji || '👛'} ${a.name} (Rp ${Math.round(a.balance).toLocaleString('id-ID')})`;
                srcSelect.appendChild(opt.cloneNode(true));
                destSelect.appendChild(opt.cloneNode(true));
            });
        } else {
            const opt = document.createElement('option');
            opt.value = 'Cash';
            opt.innerText = 'Cash';
            srcSelect.appendChild(opt.cloneNode(true));
            destSelect.appendChild(opt.cloneNode(true));
        }
    }

    // Modal Control
    function openQuickAddModal() {
        document.getElementById('quick-add-modal').classList.remove('hidden');
        document.getElementById('form-date').value = new Date().toISOString().split('T')[0];
        setFormType('expense');
    }

    function closeQuickAddModal() {
        document.getElementById('quick-add-modal').classList.add('hidden');
    }

    function setFormType(type) {
        state.formType = type;
        const btnExpense = document.getElementById('btn-form-expense');
        const btnIncome = document.getElementById('btn-form-income');
        const btnTransfer = document.getElementById('btn-form-transfer');
        const btnBills = document.getElementById('btn-form-bills');

        const activeClass = 'py-2.5 rounded-xl border-2 border-primary-500 bg-primary-50 text-primary-700 font-bold text-sm flex items-center justify-center gap-1.5';
        const inactiveClass = 'py-2.5 rounded-xl border border-slate-200 hover:bg-slate-50 text-slate-600 font-semibold text-sm flex items-center justify-center gap-1.5';

        btnExpense.className = type === 'expense' ? activeClass : inactiveClass;
        btnIncome.className = type === 'income' ? activeClass : inactiveClass;
        btnTransfer.className = type === 'transfer' ? activeClass : inactiveClass;
        btnBills.className = type === 'bills' ? activeClass : inactiveClass;

        const destContainer = document.getElementById('dest-container');
        const labelSource = document.getElementById('label-source');
        const labelCategory = document.getElementById('label-category');

        if (type === 'transfer') {
            destContainer.classList.remove('hidden');
            labelSource.innerText = 'Dari Dompet';
            labelCategory.innerText = 'Kategori';
        } else if (type === 'income') {
            destContainer.classList.add('hidden');
            labelSource.innerText = 'Ke Dompet';
            labelCategory.innerText = 'Sumber Pemasukan';
        } else {
            destContainer.classList.add('hidden');
            labelSource.innerText = 'Dari Dompet';
            labelCategory.innerText = 'Kategori Pengeluaran';
        }

        populateModalDropdowns();
    }

    async function handleTransactionSubmit(event) {
        event.preventDefault();
        const tx = {
            name: document.getElementById('form-name').value,
            amount: parseFloat(document.getElementById('form-amount').value),
            cashflow: state.formType === 'expense' ? 'Spending' : 
                      state.formType === 'income' ? 'Income' :
                      state.formType === 'transfer' ? 'Transfer' : 'Bills',
            category: document.getElementById('form-category').value,
            dari: state.formType === 'income' ? '' : document.getElementById('form-source').value,
            ke: state.formType === 'income' ? document.getElementById('form-source').value : 
                state.formType === 'transfer' ? document.getElementById('form-dest').value : '',
            type: state.formType,
            date: document.getElementById('form-date').value
        };

        try {
            const res = await fetch(`/api/transactions/${state.currentUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(tx)
            });
            await res.json();
            closeQuickAddModal();
            document.getElementById('quick-add-form').reset();
            await refreshData();
            renderActiveView();
        } catch (err) {
            alert('Failed to submit transaction: ' + err.message);
        }
    }

    async function deleteTransaction(index) {
        if (!confirm('Hapus transaksi ini?')) return;
        try {
            await fetch(`/api/transactions/${state.currentUserId}/${index}`, { method: 'DELETE' });
            await refreshData();
            renderActiveView();
        } catch (err) {
            alert('Failed to delete transaction: ' + err.message);
        }
    }

    // Set page view router
    function setView(viewId) {
        state.currentView = viewId;
        
        // Update sidebar highlights
        menuItems.forEach(item => {
            const el = document.getElementById(`nav-${item.id}`);
            if (el) {
                if (item.id === viewId) {
                    el.className = "flex items-center gap-3 w-full px-4 py-2.5 text-sm font-bold rounded-xl bg-primary-50 text-primary-700 transition-all duration-150";
                } else {
                    el.className = "flex items-center gap-3 w-full px-4 py-2.5 text-sm font-medium rounded-xl text-slate-500 hover:bg-slate-50 hover:text-slate-900 transition-all duration-150";
                }
            }
        });

        // Update mobile nav highlights
        const top5 = ['overview', 'transactions', 'ai-insight', 'budget', 'settings'];
        top5.forEach(id => {
            const el = document.getElementById(`mobile-nav-${id}`);
            if (el) {
                if (id === viewId) {
                    el.className = "flex flex-col items-center justify-center flex-1 h-full text-primary-600 gap-1";
                } else {
                    el.className = "flex flex-col items-center justify-center flex-1 h-full text-slate-400 gap-1";
                }
            }
        });

    function filterTransactionsTable() {
        const tbody = document.getElementById('txs-table-body');
        if (!tbody) return;
        tbody.innerHTML = '';

        const query = document.getElementById('tx-search').value.toLowerCase();
        const flow = document.getElementById('tx-filter-flow').value;
        const cat = document.getElementById('tx-filter-cat').value;

        const filtered = state.transactions.filter(t => {
            const matchQuery = t.name.toLowerCase().includes(query) || (t.category && t.category.toLowerCase().includes(query));
            const matchFlow = flow === 'all' || 
                              (flow === 'expense' && (t.type === 'expense' || t.type === 'bills')) ||
                              (flow === 'income' && t.type === 'income') ||
                              (flow === 'transfer' && t.type === 'transfer');
            const matchCat = cat === 'all' || t.category === cat;

            return matchQuery && matchFlow && matchCat;
        });

        if (filtered.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="text-center py-6 text-slate-400 text-xs">Tidak ditemukan transaksi yang cocok</td></tr>`;
            return;
        }

        filtered.forEach((tx, idx) => {
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50/50 transition";
            
            const isIncome = tx.type === 'income';
            const isTransfer = tx.type === 'transfer';
            const flowBg = isIncome ? 'bg-emerald-50 text-emerald-700' : isTransfer ? 'bg-blue-50 text-blue-700' : 'bg-rose-50 text-rose-700';
            const flowLabel = isIncome ? 'Masuk' : isTransfer ? 'Transfer' : 'Keluar';

            tr.innerHTML = `
                <td class="py-3.5 px-4 text-xs font-mono-jb text-slate-400">${tx.date}</td>
                <td class="py-3.5 px-4 font-semibold text-slate-700">${tx.name}</td>
                <td class="py-3.5 px-4">
                    <span class="text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider ${flowBg}">${flowLabel}</span>
                </td>
                <td class="py-3.5 px-4 text-xs text-slate-500 font-medium">${tx.category || '—'}</td>
                <td class="py-3.5 px-4 text-xs text-slate-500">${tx.dari || '—'}</td>
                <td class="py-3.5 px-4 text-xs text-slate-500">${tx.ke || '—'}</td>
                <td class="py-3.5 px-4 text-right font-bold font-mono-jb ${isIncome ? 'text-emerald-600' : isTransfer ? 'text-blue-600' : 'text-slate-700'}">
                    Rp ${Math.round(tx.amount).toLocaleString('id-ID')}
                </td>
                <td class="py-3.5 px-4 text-center">
                    <button onclick="deleteTransaction(${idx})" class="p-1 text-slate-400 hover:text-rose-500 rounded-lg hover:bg-slate-100">
                        <i data-lucide="trash" class="w-4 h-4"></i>
                    </button>
                </td>
            `;
            tbody.appendChild(tr);
        });

        lucide.createIcons();
    }

    function calculateSplitBill() {
        const total = parseFloat(document.getElementById('split-total').value) || 0;
        const friends = parseInt(document.getElementById('split-friends').value) || 0;

        if (total <= 0 || friends <= 0) {
            alert('Harap isi total tagihan dan jumlah orang secara valid.');
            return;
        }

        const perPerson = Math.round(total / (friends + 1)); // including user
        const resultDiv = document.getElementById('split-result');
        document.getElementById('split-amount-val').innerText = `Rp ${perPerson.toLocaleString('id-ID')}`;
        resultDiv.classList.remove('hidden');
    }

    function renderChartsImplementation() {
        // Cashflow Chart
        const cashflowCtx = document.getElementById('cashflow-chart').getContext('2d');
        const incomeTxs = state.transactions.filter(t => t.type === 'income');
        const expenseTxs = state.transactions.filter(t => t.type === 'expense' || t.type === 'bills');
        
        const totalIncome = incomeTxs.reduce((s, t) => s + t.amount, 0);
        const totalExpense = expenseTxs.reduce((s, t) => s + t.amount, 0);

        new Chart(cashflowCtx, {
            type: 'bar',
            data: {
                labels: ['Pemasukan (Income)', 'Pengeluaran (Expense)'],
                datasets: [{
                    label: 'Jumlah (Rupiah)',
                    data: [totalIncome, totalExpense],
                    backgroundColor: ['rgba(16, 185, 129, 0.85)', 'rgba(244, 63, 94, 0.85)'],
                    borderWidth: 0,
                    borderRadius: 12
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { y: { beginAtZero: true } }
            }
        });

        // Category Chart
        const categoryCtx = document.getElementById('category-chart').getContext('2d');
        
        const catMap = {};
        state.transactions.filter(t => t.type === 'expense' || t.type === 'bills').forEach(t => {
            catMap[t.category] = (catMap[t.category] || 0) + t.amount;
        });

        const labels = Object.keys(catMap);
        const data = Object.values(catMap);

        new Chart(categoryCtx, {
            type: 'doughnut',
            data: {
                labels: labels.length > 0 ? labels : ['Umum'],
                datasets: [{
                    data: data.length > 0 ? data : [100000],
                    backgroundColor: [
                        '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#6366f1', '#ec4899'
                    ],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { position: 'bottom' } }
            }
        });
    }

    async function sendChatMessage(event) {
        event.preventDefault();
        const input = document.getElementById('ai-chat-input');
        const text = input.value.trim();
        if (!text) return;

        const chatBox = document.getElementById('ai-chat-box');

        // Append User Bubble
        const userBubble = document.createElement('div');
        userBubble.className = "flex gap-2.5 max-w-[85%] ml-auto justify-end";
        userBubble.innerHTML = `
            <div class="bg-primary-600 text-white p-3 rounded-2xl rounded-tr-none shadow-sm text-xs leading-relaxed">
                ${text}
            </div>
        `;
        chatBox.appendChild(userBubble);
        chatBox.scrollTop = chatBox.scrollHeight;
        input.value = '';

        // Append Loading Bubble
        const loadingBubble = document.createElement('div');
        loadingBubble.className = "flex gap-2.5 max-w-[85%]";
        loadingBubble.id = "chat-loading-bubble";
        loadingBubble.innerHTML = `
            <div class="w-7 h-7 rounded-lg bg-primary-100 text-primary-700 flex items-center justify-center text-xs flex-shrink-0 font-bold"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i></div>
            <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-slate-150 shadow-sm text-xs text-slate-400">
                AI sedang berpikir...
            </div>
        `;
        chatBox.appendChild(loadingBubble);
        chatBox.scrollTop = chatBox.scrollHeight;
        lucide.createIcons();

        try {
            const res = await fetch(`/api/chat/${state.currentUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            const data = await res.json();
            
            // Remove Loading bubble
            document.getElementById('chat-loading-bubble').remove();

            // Append AI Bubble
            const aiBubble = document.createElement('div');
            aiBubble.className = "flex gap-2.5 max-w-[85%]";
            aiBubble.innerHTML = `
                <div class="w-7 h-7 rounded-lg bg-primary-100 text-primary-700 flex items-center justify-center text-xs flex-shrink-0 font-bold"><i data-lucide="sparkles" class="w-3.5 h-3.5"></i></div>
                <div class="bg-white p-3 rounded-2xl rounded-tl-none border border-slate-150 shadow-sm text-xs leading-relaxed text-slate-700">
                    ${data.reply}
                </div>
            `;
            chatBox.appendChild(aiBubble);
            chatBox.scrollTop = chatBox.scrollHeight;

            if (data.transactionAdded) {
                // Instantly update core app variables
                await refreshData();
            }
        } catch (err) {
            document.getElementById('chat-loading-bubble').remove();
            alert('Failed to connect to AI server: ' + err.message);
        }
    }

                            <li class="flex items-center gap-2"><i data-lucide="check" class="w-4 h-4 text-emerald-500"></i> Transaksi via voice note</li>
                        </ul>
                    </div>
                    <button onclick="alert('Terima kasih! Simulasi upgrade berhasil diaktifkan.')" class="w-full mt-6 py-2.5 bg-primary-600 hover:bg-primary-700 text-white font-bold rounded-xl text-xs uppercase shadow-md shadow-primary-100 transition">Mulai Berlangganan</button>
                </div>
            </div>
        `;
        container.appendChild(card);
    }

    // =============================================
    // VIEW 13: SETTINGS
    // =============================================
    function renderSettings(container) {
        const card = document.createElement('div');
        card.className = "bg-white border border-slate-200 rounded-2xl p-6 shadow-sm space-y-6 max-w-2xl mx-auto";
        card.innerHTML = `
            <div>
                <h3 class="text-lg font-bold text-slate-800">Pengaturan Sistem</h3>
                <p class="text-xs text-slate-400">Atur profil akun dan integrasikan bot pencatatan Telegram Anda</p>
            </div>

            <form onsubmit="handleSettingsUpdate(event)" class="space-y-4 pt-4 border-t border-slate-150">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Nama Pengguna</label>
                        <input type="text" id="settings-name" required class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold text-slate-500 mb-1">Bahasa Tampilan</label>
                        <select id="settings-lang" class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none">
                            <option value="id">Bahasa Indonesia</option>
                            <option value="en">English (English)</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-xs font-semibold text-slate-500 mb-1">Google Spreadsheet ID (Auto-Sync)</label>
                    <input type="text" id="settings-sheet-id" placeholder="Masukkan ID spreadsheet Anda..." class="w-full border border-slate-200 rounded-xl px-3.5 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-primary-500 font-mono-jb text-slate-600">
                </div>

                <div class="pt-4 border-t border-slate-100 flex justify-end">
                    <button type="submit" class="bg-primary-600 hover:bg-primary-700 text-white font-bold px-6 py-2.5 rounded-xl text-sm transition shadow-sm">
                        Simpan Konfigurasi
                    </button>
                </div>
            </form>

            <!-- Telegram Tutorial Box -->
            <div class="p-5 bg-slate-50 border border-slate-150 rounded-2xl space-y-3">
                <h4 class="text-xs font-bold uppercase tracking-wider text-slate-600 flex items-center gap-1.5">
                    <i data-lucide="send" class="w-4 h-4 text-primary-500"></i> Cara Menghubungkan ke Telegram Bot
                </h4>
                <ol class="text-xs text-slate-500 space-y-2 list-decimal list-inside leading-relaxed">
                    <li>Buka aplikasi Telegram dan cari bot: <span class="font-bold text-primary-600">@CuanTrack_Bot</span></li>
                    <li>Kirim pesan perintah <span class="font-mono-jb font-bold text-slate-600">/start</span> untuk memulai interaksi.</li>
                    <li>Masukkan ID Pengguna Anda saat ini (<span class="font-mono-jb font-bold text-slate-700">${state.currentUserId}</span>) di bot untuk sinkronisasi otomatis instan!</li>
                </ol>
            </div>
        `;
        container.appendChild(card);

        // Fill current fields
        if (state.currentUserData) {
            document.getElementById('settings-name').value = state.currentUserData.name;
            document.getElementById('settings-lang').value = state.currentUserData.lang || 'id';
            document.getElementById('settings-sheet-id').value = state.currentUserData.spreadsheetId || '';
        }
    }

    async function handleSettingsUpdate(event) {
        event.preventDefault();
        const payload = {
            name: document.getElementById('settings-name').value,
            lang: document.getElementById('settings-lang').value,
            spreadsheetId: document.getElementById('settings-sheet-id').value
        };

        try {
            const res = await fetch(`/api/user/${state.currentUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            await res.json();
            alert('Konfigurasi pengaturan disimpan dengan sukses.');
            await refreshData();
            setupLayouts();
            renderActiveView();
        } catch (err) {
            alert('Gagal memperbarui pengaturan: ' + err.message);
        }
    }

    // =============================================
    // VIEW 14: PROFILE
    // =============================================
    function renderProfile(container) {
        if (!state.currentUserData) return;
        const card = document.createElement('div');
        card.className = "bg-white border border-slate-200 rounded-2xl p-6 shadow-sm max-w-md mx-auto text-center space-y-4";
        card.innerHTML = `
            <div class="flex flex-col items-center">
                <div class="w-20 h-20 bg-primary-100 text-primary-700 text-3xl font-extrabold flex items-center justify-center rounded-full shadow-inner mb-3">
                    ${state.currentUserData.name.charAt(0).toUpperCase()}
                </div>
                <h3 class="text-lg font-bold text-slate-800">${state.currentUserData.name}</h3>
                <p class="text-xs text-slate-400">@${state.currentUserData.username || 'user'}</p>
            </div>

            <div class="divide-y divide-slate-100 border-y border-slate-100 text-xs py-2">
                <div class="flex justify-between py-2.5">
                    <span class="text-slate-400 font-semibold">Tipe Akun</span>
                    <span class="font-bold text-amber-500 flex items-center gap-1"><i data-lucide="star" class="w-3.5 h-3.5 fill-current"></i> Premium (Active)</span>
                </div>
                <div class="flex justify-between py-2.5">
                    <span class="text-slate-400 font-semibold">Tanggal Gabung</span>
                    <span class="font-semibold text-slate-600">${new Date(state.currentUserData.createdAt || Date.now()).toLocaleDateString('id-ID')}</span>
                </div>
                <div class="flex justify-between py-2.5">
                    <span class="text-slate-400 font-semibold">Bahasa</span>
                    <span class="font-semibold text-slate-600 uppercase">${state.currentUserData.lang || 'id'}</span>
                </div>
            </div>

            <div class="pt-2 text-center text-[10px] text-slate-400">
                ID Pengguna: <span class="font-mono-jb font-bold text-slate-600">${state.currentUserId}</span>
            </div>
        `;
        container.appendChild(card);
    }

    function toggleDarkMode() {
        state.darkMode = !state.darkMode;
        if (state.darkMode) {
            document.documentElement.classList.add('dark');
            alert('Mode Gelap disimulasikan! (Dukungan penuh ada di pembaruan rilis berikutnya)');
        } else {
            document.documentElement.classList.remove('dark');
        }
    }
</script>
</body>
</html>
